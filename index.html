<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tactical Naval Simulator v2.1</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    :root {
        --bg: #050a0e;
        --panel-bg: #0a1118;
        --grid-bg: #021014;
        --grid-border: #0a2e38;
        --text: #00ffcc;
        --alert: #ff2a2a;
        --ship: #0088ff;
        --metal-dark: #2a2d34;
        --metal-light: #8d99ae;
    }
    
    body {
        background-color: var(--bg);
        color: var(--text);
        font-family: 'Share Tech Mono', monospace;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow-x: hidden;
        text-shadow: 0 0 5px rgba(0, 255, 204, 0.5);
    }

    body::after {
        content: " ";
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        z-index: 2;
        background-size: 100% 2px, 3px 100%;
        pointer-events: none;
    }

    h1, h2, h3 { 
        margin: 5px 0; 
        text-transform: uppercase; 
        letter-spacing: 2px;
        border-bottom: 1px solid var(--grid-border);
        padding-bottom: 5px;
    }
    
    .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
    .heavy-shake { animation: heavy-shake 0.8s cubic-bezier(.36,.07,.19,.97) both; }
    .flash-red { animation: flash 0.5s ease-in-out 3; }
    
    @keyframes shake {
        10%, 90% { transform: translate3d(-1px, 0, 0); }
        20%, 80% { transform: translate3d(2px, 0, 0); }
        30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
        40%, 60% { transform: translate3d(4px, 0, 0); }
    }
    @keyframes heavy-shake {
        10%, 90% { transform: translate3d(-4px, -4px, 0); }
        20%, 80% { transform: translate3d(8px, 8px, 0); }
        30%, 50%, 70% { transform: translate3d(-12px, -12px, 0); }
        40%, 60% { transform: translate3d(12px, 12px, 0); }
    }
    @keyframes flash {
        0%, 100% { background-color: var(--bg); }
        50% { background-color: #4a0000; }
    }
    @keyframes sink {
        0% { opacity: 1; transform: scale(1); }
        100% { opacity: 0; transform: scale(0.1); background-color: #000; border-color: #000; }
    }
    @keyframes radar-sweep {
        0% { box-shadow: inset 0 0 10px rgba(0,255,204,0.1); }
        50% { box-shadow: inset 0 0 30px rgba(0,255,204,0.4); }
        100% { box-shadow: inset 0 0 10px rgba(0,255,204,0.1); }
    }

    #game-board {
        display: flex;
        gap: 40px;
        margin-bottom: 20px;
        position: relative;
        z-index: 3;
    }
    .grid-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        background: var(--panel-bg);
        padding: 15px;
        border: 2px solid var(--grid-border);
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
    }
    .grid {
        display: grid;
        grid-template-columns: repeat(12, 35px);
        grid-template-rows: repeat(12, 35px);
        gap: 1px;
        background-color: var(--grid-border);
        border: 2px solid var(--text);
        position: relative;
        animation: radar-sweep 4s infinite linear;
    }
    .cell {
        width: 35px;
        height: 35px;
        background-color: var(--grid-bg);
        cursor: crosshair;
        box-sizing: border-box;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 12px;
        transition: background-color 0.2s;
    }
    .enemy-cell:hover { background-color: rgba(0, 255, 204, 0.2); }
    
    .cell.ship { background-color: var(--ship); box-shadow: inset 0 0 10px rgba(0,136,255,0.8); }
    .cell.hit { background-color: var(--alert); box-shadow: inset 0 0 15px rgba(255,42,42,0.8); border: 1px solid #fff; }
    .cell.miss { background-color: #2b3a42; border: 1px solid #455a64; }
    .cell.sunk { animation: sink 2s forwards; }

    #controls-container {
        display: flex;
        gap: 20px;
        width: 100%;
        max-width: 1000px;
        justify-content: space-between;
        position: relative;
        z-index: 3;
    }
    .panel {
        border: 2px solid var(--grid-border);
        padding: 20px;
        background: var(--panel-bg);
        flex: 1;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }
    
    .switch-group {
        display: flex;
        gap: 30px;
        margin-bottom: 25px;
        justify-content: center;
        background: #0f151c;
        padding: 15px;
        border: 1px inset #2a3d4f;
    }
    .military-toggle {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        cursor: pointer;
    }
    .military-toggle input { display: none; }
    
    .toggle-body {
        width: 30px;
        height: 60px;
        background: linear-gradient(180deg, #111 0%, #333 100%);
        border: 2px solid #000;
        border-radius: 4px;
        position: relative;
        box-shadow: inset 0 2px 5px rgba(255,255,255,0.1), 0 5px 10px rgba(0,0,0,0.8);
    }
    
    .toggle-lever {
        position: absolute;
        bottom: 5px;
        left: 5px;
        width: 16px;
        height: 30px;
        background: linear-gradient(90deg, var(--metal-light) 0%, #fff 50%, var(--metal-light) 100%);
        border-radius: 2px;
        transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 5px 5px rgba(0,0,0,0.9);
        border-bottom: 2px solid var(--metal-dark);
    }

    .military-toggle input:checked + .toggle-body .toggle-lever {
        bottom: 25px;
        box-shadow: 0 -5px 5px rgba(0,0,0,0.9);
        border-bottom: none;
        border-top: 2px solid var(--metal-dark);
        background: linear-gradient(90deg, #ffaaaa 0%, #ff5555 50%, #aa0000 100%);
    }

    .led-indicator {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #111;
        border: 1px solid #000;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
        transition: 0.3s;
    }

    .military-toggle input:checked ~ .led-indicator {
        background: #ff2a2a;
        box-shadow: 0 0 10px #ff2a2a, inset 0 0 5px #fff;
    }

    .toggle-label { font-weight: bold; font-size: 14px; letter-spacing: 1px; color: #8d99ae; }

    #fire-btn {
        width: 100%;
        padding: 20px;
        font-family: 'Share Tech Mono', monospace;
        font-weight: bold;
        font-size: 24px;
        background: linear-gradient(180deg, #333 0%, #111 100%);
        color: #555;
        border: 4px solid #222;
        border-radius: 8px;
        cursor: not-allowed;
        transition: 0.3s;
        text-shadow: 1px 1px 0px #000;
        text-transform: uppercase;
        letter-spacing: 4px;
    }
    #fire-btn.armed {
        background: linear-gradient(180deg, #ff4444 0%, #aa0000 100%);
        color: white;
        border-color: #ffaaaa;
        cursor: pointer;
        box-shadow: 0 0 20px rgba(255, 42, 42, 0.8), inset 0 0 15px rgba(255, 255, 255, 0.4);
        text-shadow: 0 0 5px #fff;
    }
    #fire-btn.armed:active {
        background: #880000;
        box-shadow: inset 0 10px 20px rgba(0,0,0,0.8);
        border-color: #550000;
        transform: translateY(2px);
    }

    .move-controls {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-top: 15px;
    }
    .move-controls button {
        background: #0f1c26;
        color: var(--text);
        font-family: 'Share Tech Mono', monospace;
        border: 1px solid var(--grid-border);
        padding: 10px 5px;
        cursor: pointer;
        transition: 0.2s;
        text-transform: uppercase;
    }
    .move-controls button:hover { 
        background: var(--text); 
        color: var(--bg); 
        box-shadow: 0 0 10px var(--text);
    }
    #target-coords { 
        font-size: 24px; 
        font-weight: bold; 
        margin-bottom: 15px; 
        color: #ffcc00; 
        text-shadow: 0 0 5px rgba(255, 204, 0, 0.5);
        background: #000;
        padding: 10px;
        border: 1px solid #333;
        text-align: center;
    }
    
    select { 
        background: #000; 
        color: var(--text); 
        border: 1px solid var(--grid-border); 
        padding: 10px; 
        width: 100%; 
        font-family: 'Share Tech Mono', monospace;
        font-size: 16px;
    }

    #intel-log {
        height: 150px;
        overflow-y: auto;
        background: #000;
        border: 1px solid var(--grid-border);
        padding: 10px;
        font-size: 14px;
        line-height: 1.4;
        color: #00ffcc;
    }
    #intel-log div { border-bottom: 1px dashed #113333; padding-bottom: 3px; margin-bottom: 3px; }
    
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #000; border-left: 1px solid var(--grid-border); }
    ::-webkit-scrollbar-thumb { background: var(--grid-border); }
    ::-webkit-scrollbar-thumb:hover { background: var(--text); }
</style>
</head>
<body>

<h1>Tactical Naval Simulator v2.1</h1>

<div id="game-board">
    <div class="grid-container">
        <h2>Local Fleet (Player)</h2>
        <div id="player-grid" class="grid"></div>
    </div>
    <div class="grid-container">
        <h2>Hostile Waters (Enemy)</h2>
        <div id="enemy-grid" class="grid"></div>
    </div>
</div>

<div id="controls-container">
    <div class="panel">
        <h3>Weapons Control</h3>
        <div id="target-coords">TARGET: [ NONE ]</div>
        <div class="switch-group">
            <label class="military-toggle">
                <input type="checkbox" id="sw-power" onchange="handleToggleChange()">
                <div class="toggle-body"><div class="toggle-lever"></div></div>
                <div class="led-indicator"></div>
                <span class="toggle-label">PWR</span>
            </label>
            <label class="military-toggle">
                <input type="checkbox" id="sw-fuel" onchange="handleToggleChange()">
                <div class="toggle-body"><div class="toggle-lever"></div></div>
                <div class="led-indicator"></div>
                <span class="toggle-label">FUEL</span>
            </label>
            <label class="military-toggle">
                <input type="checkbox" id="sw-ign" onchange="handleToggleChange()">
                <div class="toggle-body"><div class="toggle-lever"></div></div>
                <div class="led-indicator"></div>
                <span class="toggle-label">IGN</span>
            </label>
        </div>
        <button id="fire-btn" disabled onclick="executeFire()">LAUNCH</button>
    </div>

    <div class="panel">
        <h3>Fleet Command (Move)</h3>
        <select id="ship-selector"></select>
        <div class="move-controls">
            <div></div>
            <button onclick="moveShip(0, -1)">N 1</button>
            <button onclick="moveShip(0, -2)">N 2</button>
            <button onclick="moveShip(-1, 0)">W 1</button>
            <button onclick="moveShip(0, 0)">HOLD</button>
            <button onclick="moveShip(1, 0)">E 1</button>
            <button onclick="moveShip(-2, 0)">W 2</button>
            <button onclick="moveShip(0, 1)">S 1</button>
            <button onclick="moveShip(0, 2)">S 2</button>
            <div></div><div></div><button onclick="moveShip(2, 0)">E 2</button>
        </div>
    </div>

    <div class="panel">
        <h3>SIGINT (Delay: 5 Turns)</h3>
        <div id="intel-log">Awaiting reconnaissance data...</div>
    </div>
</div>

<script>
// --- AUDIO ENGINE ---
const AudioContext = window.AudioContext || window.webkitAudioContext;
let actx;
let idleOsc = null;
let idleGain = null;
let lfo = null;

function initAudio() {
    if(!actx) actx = new AudioContext();
    if(actx.state === 'suspended') actx.resume();
}

function playToggleSound() {
    initAudio();
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(800, actx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(100, actx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.1, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.1);
    osc.connect(gain);
    gain.connect(actx.destination);
    osc.start();
    osc.stop(actx.currentTime + 0.1);
}

function startIdleSound() {
    if(!actx || idleOsc) return; 
    
    idleOsc = actx.createOscillator();
    idleGain = actx.createGain();
    lfo = actx.createOscillator();

    idleOsc.type = 'sawtooth';
    idleOsc.frequency.setValueAtTime(40, actx.currentTime); 

    lfo.type = 'sine';
    lfo.frequency.setValueAtTime(5, actx.currentTime); 
    const lfoGain = actx.createGain();
    lfoGain.gain.setValueAtTime(10, actx.currentTime);
    
    lfo.connect(lfoGain);
    lfoGain.connect(idleOsc.frequency);
    lfo.start();

    idleGain.gain.setValueAtTime(0, actx.currentTime);
    idleGain.gain.linearRampToValueAtTime(0.3, actx.currentTime + 0.5); 

    idleOsc.connect(idleGain);
    idleGain.connect(actx.destination);
    idleOsc.start();
}

function stopIdleSound() {
    if(!idleOsc || !idleGain) return;
    
    idleGain.gain.cancelScheduledValues(actx.currentTime);
    idleGain.gain.setValueAtTime(idleGain.gain.value, actx.currentTime);
    idleGain.gain.linearRampToValueAtTime(0, actx.currentTime + 0.2); 
    
    idleOsc.stop(actx.currentTime + 0.2);
    if(lfo) lfo.stop(actx.currentTime + 0.2);
    
    idleOsc = null;
    idleGain = null;
    lfo = null;
}

function playTone(freq, type, duration) {
    if(!actx) return;
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, actx.currentTime);
    gain.gain.setValueAtTime(0.1, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + duration);
    osc.connect(gain);
    gain.connect(actx.destination);
    osc.start();
    osc.stop(actx.currentTime + duration);
}

function playFire() {
    playTone(100, 'sawtooth', 0.5);
    setTimeout(() => playTone(50, 'square', 0.5), 100);
}

function playMiss() {
    if(!actx) return;
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.frequency.setValueAtTime(400, actx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(50, actx.currentTime + 1);
    gain.gain.setValueAtTime(0.1, actx.currentTime);
    gain.gain.linearRampToValueAtTime(0, actx.currentTime + 1);
    osc.connect(gain);
    gain.connect(actx.destination);
    osc.start();
    osc.stop(actx.currentTime + 1);
}

function playExplosion() {
    if(!actx) return;
    const bufferSize = actx.sampleRate * 2; 
    const buffer = actx.createBuffer(1, bufferSize, actx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
    }
    const noise = actx.createBufferSource();
    noise.buffer = buffer;
    const filter = actx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 1000;
    const gain = actx.createGain();
    gain.gain.setValueAtTime(1, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 1.5);
    
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(actx.destination);
    noise.start();
}

function playAlarm() {
    if(!actx) return;
    for(let i=0; i<4; i++) {
        setTimeout(() => {
            const osc = actx.createOscillator();
            const gain = actx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(800, actx.currentTime);
            gain.gain.setValueAtTime(0.1, actx.currentTime);
            gain.gain.linearRampToValueAtTime(0, actx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(actx.destination);
            osc.start();
            osc.stop(actx.currentTime + 0.3);
        }, i * 400);
    }
}

function playSink() {
    if(!actx) return;
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(200, actx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(20, actx.currentTime + 2);
    gain.gain.setValueAtTime(0.2, actx.currentTime);
    gain.gain.linearRampToValueAtTime(0, actx.currentTime + 2);
    osc.connect(gain);
    gain.connect(actx.destination);
    osc.start();
    osc.stop(actx.currentTime + 2);
}

// --- GAME LOGIC ---
const GRID_SIZE = 12;
const SHIP_TYPES = [
    { name: "Carrier", size: 5 },
    { name: "Battleship", size: 4 },
    { name: "Cruiser", size: 3 },
    { name: "Submarine", size: 3 },
    { name: "Destroyer", size: 2 },
    { name: "Frigate", size: 2 },
    { name: "Corvette", size: 2 },
    { name: "Patrol", size: 1 }
];

let playerShips = [];
let enemyShips = [];
let playerBoard = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(null));
let enemyBoard = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(null));
let turn = 0;
let intelHistory = [];
let selectedTarget = null;
let gameActive = true;

function createGrid(id, isEnemy) {
    const grid = document.getElementById(id);
    grid.innerHTML = '';
    for(let y=0; y<GRID_SIZE; y++) {
        for(let x=0; x<GRID_SIZE; x++) {
            const cell = document.createElement('div');
            cell.className = 'cell' + (isEnemy ? ' enemy-cell' : '');
            cell.dataset.x = x;
            cell.dataset.y = y;
            if(isEnemy) {
                cell.onclick = () => selectTarget(x, y);
            }
            grid.appendChild(cell);
        }
    }
}

function isValidPlacement(board, coords) {
    for(let c of coords) {
        if(c.x < 0 || c.x >= GRID_SIZE || c.y < 0 || c.y >= GRID_SIZE) return false;
        if(board[c.y][c.x] !== null) return false;
    }
    return true;
}

function generateShips(board, shipArray) {
    SHIP_TYPES.forEach((type, idx) => {
        let placed = false;
        while(!placed) {
            let x = Math.floor(Math.random() * GRID_SIZE);
            let y = Math.floor(Math.random() * GRID_SIZE);
            let horizontal = Math.random() > 0.5;
            let coords = [];
            for(let i=0; i<type.size; i++) {
                coords.push({ x: x + (horizontal ? i : 0), y: y + (horizontal ? 0 : i), hit: false });
            }
            if(isValidPlacement(board, coords)) {
                coords.forEach(c => board[c.y][c.x] = idx);
                shipArray.push({ id: idx, ...type, coords: coords, sunk: false });
                placed = true;
            }
        }
    });
}

function drawPlayerGrid() {
    const cells = document.getElementById('player-grid').children;
    for(let cell of cells) {
        cell.className = 'cell';
        let x = parseInt(cell.dataset.x);
        let y = parseInt(cell.dataset.y);
        let val = playerBoard[y][x];
        if(val !== null) {
            if(val === 'M') cell.classList.add('miss');
            else if(val === 'H') cell.classList.add('hit');
            else {
                cell.classList.add('ship');
                let ship = playerShips[val];
                let isHit = ship.coords.find(c => c.x === x && c.y === y).hit;
                if(isHit) cell.classList.add('hit');
                if(ship.sunk) cell.classList.add('sunk');
            }
        }
    }
}

function drawEnemyGrid(reveal = false) {
    const cells = document.getElementById('enemy-grid').children;
    for(let cell of cells) {
        cell.className = 'cell enemy-cell';
        let x = parseInt(cell.dataset.x);
        let y = parseInt(cell.dataset.y);
        let val = enemyBoard[y][x];
        if(selectedTarget && selectedTarget.x === x && selectedTarget.y === y) {
            cell.style.border = '2px solid #ffcc00';
            cell.style.boxShadow = 'inset 0 0 15px rgba(255, 204, 0, 0.5)';
        } else {
            cell.style.border = 'none';
            cell.style.boxShadow = 'none';
        }

        if(val === 'M') cell.classList.add('miss');
        else if(val === 'H') cell.classList.add('hit');
        else if(val !== null && val !== 'M' && val !== 'H') {
            let ship = enemyShips[val];
            let isHit = ship.coords.find(c => c.x === x && c.y === y).hit;
            if(isHit) cell.classList.add('hit');
            if(ship.sunk) cell.classList.add('sunk');
            if(reveal && !isHit && !ship.sunk) cell.classList.add('ship');
        }
    }
}

function selectTarget(x, y) {
    if(!gameActive) return;
    initAudio();
    selectedTarget = {x, y};
    document.getElementById('target-coords').innerText = `TARGET: [ X:${x.toString().padStart(2, '0')} Y:${y.toString().padStart(2, '0')} ]`;
    drawEnemyGrid();
}

function handleToggleChange() {
    playToggleSound();
    checkArming();
}

function checkArming() {
    const p = document.getElementById('sw-power').checked;
    const f = document.getElementById('sw-fuel').checked;
    const i = document.getElementById('sw-ign').checked;
    const btn = document.getElementById('fire-btn');
    if(p && f && i) {
        btn.disabled = false;
        btn.classList.add('armed');
        startIdleSound();
    } else {
        btn.disabled = true;
        btn.classList.remove('armed');
        stopIdleSound();
    }
}

function resetFirePanel() {
    document.getElementById('sw-power').checked = false;
    document.getElementById('sw-fuel').checked = false;
    document.getElementById('sw-ign').checked = false;
    checkArming();
    selectedTarget = null;
    document.getElementById('target-coords').innerText = `TARGET: [ NONE ]`;
}

function logMessage(msg) {
    const log = document.getElementById('intel-log');
    const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: "numeric", minute: "numeric", second: "numeric" });
    log.innerHTML += `<div>[${time}] T${turn}: ${msg}</div>`;
    log.scrollTop = log.scrollHeight;
}

function recordIntel() {
    let intel = [];
    enemyShips.forEach(s => {
        if(!s.sunk) s.coords.forEach(c => intel.push(`(${c.x},${c.y})`));
    });
    intelHistory.push(intel);
}

function deliverIntel() {
    if(turn >= 5) {
        let oldIntel = intelHistory[turn - 5];
        logMessage(`SIGINT ALERT: Hostile signatures detected 5 cycles ago at: ${oldIntel.slice(0,4).join(' ')}...`);
    }
}

function moveShip(dx, dy) {
    if(!gameActive) return;
    const sel = document.getElementById('ship-selector');
    const shipId = parseInt(sel.value);
    let ship = playerShips[shipId];
    if(ship.sunk) { alert("Vessel destroyed. Cannot execute maneuver."); return; }
    if(dx === 0 && dy === 0) return;

    ship.coords.forEach(c => playerBoard[c.y][c.x] = null);
    
    let newCoords = ship.coords.map(c => ({ x: c.x + dx, y: c.y + dy, hit: c.hit }));
    
    if(isValidPlacement(playerBoard, newCoords)) {
        ship.coords = newCoords;
        logMessage(`${ship.name} maneuver complete.`);
    } else {
        logMessage(`NAV ERROR: Invalid coordinates for ${ship.name}.`);
    }
    
    ship.coords.forEach(c => playerBoard[c.y][c.x] = shipId);
    drawPlayerGrid();
}

function executeFire() {
    if(!gameActive || !selectedTarget) return;
    stopIdleSound();
    
    document.body.classList.remove('shake', 'heavy-shake');
    void document.body.offsetWidth;
    document.body.classList.add('shake');
    playFire();

    setTimeout(() => {
        let x = selectedTarget.x;
        let y = selectedTarget.y;
        let val = enemyBoard[y][x];

        if(val !== null && val !== 'M' && val !== 'H') {
            enemyBoard[y][x] = 'H';
            let ship = enemyShips[val];
            ship.coords.find(c => c.x === x && c.y === y).hit = true;
            playExplosion();
            document.body.classList.remove('shake');
            void document.body.offsetWidth;
            document.body.classList.add('heavy-shake');
            
            if(ship.coords.every(c => c.hit)) {
                ship.sunk = true;
                playSink();
                logMessage(`TARGET DESTROYED: Enemy ${ship.name} eliminated.`);
                checkWinCondition();
            } else {
                logMessage(`IMPACT CONFIRMED at X:${x} Y:${y}`);
            }
        } else if (val === null) {
            enemyBoard[y][x] = 'M';
            playMiss();
            logMessage(`ORDNANCE MISSED at X:${x} Y:${y}`);
        }

        drawEnemyGrid();
        resetFirePanel();
        
        recordIntel();
        deliverIntel();
        
        if(gameActive) setTimeout(computerTurn, 1000);
    }, 500);
}

function computerTurn() {
    playAlarm();
    
    setTimeout(() => {
        let x, y;
        do {
            x = Math.floor(Math.random() * GRID_SIZE);
            y = Math.floor(Math.random() * GRID_SIZE);
        } while (playerBoard[y][x] === 'M' || playerBoard[y][x] === 'H');

        let val = playerBoard[y][x];
        if(val !== null && val !== 'M' && val !== 'H') {
            playerBoard[y][x] = 'H';
            let ship = playerShips[val];
            ship.coords.find(c => c.x === x && c.y === y).hit = true;
            
            document.body.classList.remove('flash-red', 'heavy-shake');
            void document.body.offsetWidth;
            document.body.classList.add('flash-red', 'heavy-shake');
            playExplosion();

            if(ship.coords.every(c => c.hit)) {
                ship.sunk = true;
                playSink();
                logMessage(`CRITICAL DAMAGE: Local ${ship.name} lost.`);
                checkWinCondition();
            }
        } else if (val === null) {
             playerBoard[y][x] = 'M';
             playMiss();
        }

        let aliveEnemies = enemyShips.filter(s => !s.sunk);
        if(aliveEnemies.length > 0) {
            let s = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];
            let dx = Math.floor(Math.random() * 3) - 1;
            let dy = Math.floor(Math.random() * 3) - 1;
            
            s.coords.forEach(c => { if(enemyBoard[c.y][c.x] === s.id) enemyBoard[c.y][c.x] = null; });
            let newCoords = s.coords.map(c => ({ x: c.x + dx, y: c.y + dy, hit: c.hit }));
            if(isValidPlacement(enemyBoard, newCoords)) {
                s.coords = newCoords;
            }
            s.coords.forEach(c => { if(!c.hit) enemyBoard[c.y][c.x] = s.id; else enemyBoard[c.y][c.x] = 'H'; });
        }

        drawPlayerGrid();
        turn++;
    }, 1200);
}

function checkWinCondition() {
    if(enemyShips.every(s => s.sunk)) {
        gameActive = false;
        alert("MISSION ACCOMPLISHED. Hostile fleet eradicated.");
        drawEnemyGrid(true);
    } else if (playerShips.every(s => s.sunk)) {
        gameActive = false;
        alert("MISSION FAILED. Local fleet destroyed.");
        drawEnemyGrid(true);
    }
}

function initGame() {
    createGrid('player-grid', false);
    createGrid('enemy-grid', true);
    generateShips(playerBoard, playerShips);
    generateShips(enemyBoard, enemyShips);
    drawPlayerGrid();
    drawEnemyGrid();
    
    const sel = document.getElementById('ship-selector');
    playerShips.forEach((s, i) => {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerText = s.name;
        sel.appendChild(opt);
    });
}

initGame();
</script>
