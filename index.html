<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General's Command: WWII Strategy Simulator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #33ff33;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        
        h1 {
            margin: 20px 0;
            text-shadow: 0 0 10px #33ff33, 0 0 20px #33ff33;
            font-size: 2.5em;
            text-align: center;
        }
        
        .game-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            width: 100%;
        }
        
        #canvas-container {
            position: relative;
            border: 3px solid #33ff33;
            box-shadow: 0 0 20px rgba(51, 255, 51, 0.5);
        }
        
        canvas {
            display: block;
            background-color: #1a1a1a;
        }
        
        .ui-panel {
            width: 300px;
            background-color: #2a2a2a;
            border: 2px solid #33ff33;
            padding: 20px;
            box-shadow: 0 0 15px rgba(51, 255, 51, 0.3);
        }
        
        .panel-section {
            margin-bottom: 20px;
            border-bottom: 1px dashed #33ff33;
            padding-bottom: 15px;
        }
        
        .panel-section:last-child {
            border-bottom: none;
        }
        
        h2 {
            color: #33ff33;
            margin-top: 0;
            font-size: 1.4em;
            text-transform: uppercase;
        }
        
        .resource-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 5px 10px;
            background-color: #333;
            border-radius: 4px;
        }
        
        .resource-value {
            color: #fff;
            font-weight: bold;
        }
        
        .resource-amount {
            color: #ffcc00;
        }
        
        button {
            background-color: #2a6e2a;
            color: #33ff33;
            border: 2px solid #33ff33;
            padding: 10px 15px;
            margin: 5px 0;
            width: 100%;
            font-family: 'Courier New', monospace;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
        }
        
        button:hover {
            background-color: #3a8e3a;
            box-shadow: 0 0 10px rgba(51, 255, 51, 0.5);
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .unit-card {
            background-color: #3a3a3a;
            border: 1px solid #4a4a4a;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        
        .unit-name {
            font-weight: bold;
            color: #33ff33;
            margin-bottom: 5px;
        }
        
        .unit-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            font-size: 0.9em;
        }
        
        .stat-label {
            color: #aaa;
        }
        
        .stat-value {
            color: #fff;
        }
        
        .log-container {
            height: 200px;
            overflow-y: auto;
            background-color: #1a1a1a;
            border: 1px solid #33ff33;
            padding: 10px;
            font-size: 0.85em;
        }
        
        .log-entry {
            margin-bottom: 5px;
            padding-left: 10px;
            border-left: 2px solid #33ff33;
        }
        
        .log-entry.danger { color: #ff6666; }
        .log-entry.success { color: #66ff66; }
        .log-entry.info { color: #ffff66; }
        
        .radar-sweep {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            animation: radarSweep 3s infinite linear;
            background: conic-gradient(from 0deg, transparent 0deg, rgba(51, 255, 51, 0.2) 60deg, transparent 60deg);
        }
        
        @keyframes radarSweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .screen-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }
        
        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            animation: flashFade 0.3s ease-out;
        }
        
        @keyframes flashFade {
            0% { background-color: rgba(255, 255, 255, 0.8); opacity: 1; }
            100% { opacity: 0; }
        }
        
        .damage-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
            animation: damageFade 0.5s ease-out;
        }
        
        @keyframes damageFade {
            0% { background-color: rgba(255, 0, 0, 0.4); opacity: 1; }
            100% { opacity: 0; }
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
    </style>
</head>
<body>
    <h1>GENERAL'S COMMAND</h1>
    
    <div class="game-container">
        <div id="canvas-container">
            <canvas id="gameCanvas" width="800" height="640"></canvas>
            <div class="radar-sweep"></div>
        </div>
        
        <div class="ui-panel">
            <div class="panel-section">
                <h2>COMMANDER'S RESOURCES</h2>
                <div class="resource-item">
                    <span>FUEL:</span>
                    <span id="fuelDisplay" class="resource-amount">500</span>
                </div>
                <div class="resource-item">
                    <span>AMMO:</span>
                    <span id="ammoDisplay" class="resource-amount">800</span>
                </div>
                <div class="resource-item">
                    <span>INTELLIGENCE:</span>
                    <span id="intelDisplay" class="resource-amount">3</span>
                </div>
                <div class="resource-item">
                    <span>CIVILIAN TRUST:</span>
                    <span id="civilianDisplay" class="resource-amount">100%</span>
                </div>
            </div>
            
            <div class="panel-section">
                <h2>ACTIVE UNITS</h2>
                <div id="unitsContainer"></div>
            </div>
            
            <div class="panel-section">
                <h2>TACTICAL COMMANDS</h2>
                <div class="controls">
                    <button onclick="game.recon()">Recon Plane (3)</button>
                    <button onclick="game.advance()">Advance All Units</button>
                    <button onclick="game.defend()">Defensive Stance</button>
                    <button onclick="game.airstrike()">Call Airstrike (50 fuel)</button>
                </div>
            </div>
            
            <div class="panel-section">
                <h2>MISSION LOG</h2>
                <div id="logContainer" class="log-container"></div>
            </div>
        </div>
    </div>

    <script>
        // Game configuration
        const CONFIG = {
            tileSize: 64,
            cols: 10,
            rows: 8,
            colors: {
                grass: '#2d6e32',
                forest: '#1a4a20',
                town: '#b94e48',
                road: '#5c4033',
                water: '#1e3c72',
                gridLine: 'rgba(255, 255, 255, 0.1)'
            }
        };

        // Sound system using Web Audio API
        class SoundSystem {
            constructor() {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                this.masterGain = this.audioContext.createGain();
                this.masterGain.gain.value = 0.5;
                this.masterGain.connect(this.audioContext.destination);
            }

            playExplosion() {
                if (this.audioContext.state === 'suspended') {
                    this.audioContext.resume();
                }
                
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(100, this.audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(10, this.audioContext.currentTime + 0.5);
                
                gainNode.gain.setValueAtTime(1, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.5);
                
                oscillator.connect(gainNode);
                gainNode.connect(this.masterGain);
                
                oscillator.start();
                oscillator.stop(this.audioContext.currentTime + 0.5);
            }

            playRadio() {
                if (this.audioContext.state === 'suspended') {
                    this.audioContext.resume();
                }
                
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(800, this.audioContext.currentTime);
                gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.2);
                
                oscillator.connect(gainNode);
                gainNode.connect(this.masterGain);
                
                oscillator.start();
                oscillator.stop(this.audioContext.currentTime + 0.2);
            }

            playSelect() {
                if (this.audioContext.state === 'suspended') {
                    this.audioContext.resume();
                }
                
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(400, this.audioContext.currentTime);
                gainNode.gain.setValueAtTime(0.2, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.1);
                
                oscillator.connect(gainNode);
                gainNode.connect(this.masterGain);
                
                oscillator.start();
                oscillator.stop(this.audioContext.currentTime + 0.1);
            }
        }

        // Particle system for explosions and effects
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 5 + 2;
                this.speedX = (Math.random() - 0.5) * 10;
                this.speedY = (Math.random() - 0.5) * 10;
                this.life = 30;
                this.maxLife = 30;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life--;
                this.size *= 0.95;
            }

            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life / this.maxLife;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        // Game units
        class Unit {
            constructor(x, y, type, owner) {
                this.x = x;
                this.y = y;
                this.type = type; // 'infantry', 'tank', 'artillery'
                this.owner = owner; // 'player', 'enemy'
                
                // Base stats
                if (type === 'infantry') {
                    this.hp = 30;
                    this.maxHp = 30;
                    this.damage = 5;
                    this.range = 2;
                    this.speed = 1;
                    this.costFuel = 10;
                    this.costAmmo = 5;
                } else if (type === 'tank') {
                    this.hp = 60;
                    this.maxHp = 60;
                    this.damage = 12;
                    this.range = 3;
                    this.speed = 2;
                    this.costFuel = 20;
                    this.costAmmo = 10;
                } else if (type === 'artillery') {
                    this.hp = 20;
                    this.maxHp = 20;
                    this.damage = 25;
                    this.range = 4;
                    this.speed = 1;
                    this.costFuel = 15;
                    this.costAmmo = 20;
                }
                
                this.moved = false;
            }

            move(dx, dy) {
                if (this.moved) return false;
                
                const newX = this.x + dx * this.speed;
                const newY = this.y + dy * this.speed;
                
                // Check boundaries
                if (newX < 0 || newX >= CONFIG.cols || newY < 0 || newY >= CONFIG.rows) {
                    return false;
                }
                
                this.x = newX;
                this.y = newY;
                this.moved = true;
                return true;
            }

            attack(target, game) {
                const distance = Math.sqrt(Math.pow(target.x - this.x, 2) + Math.pow(target.y - this.y, 2));
                
                if (distance <= this.range) {
                    target.hp -= this.damage;
                    
                    // Add particle effect
                    const centerX = this.x * CONFIG.tileSize + CONFIG.tileSize / 2;
                    const centerY = this.y * CONFIG.tileSize + CONFIG.tileSize / 2;
                    game.particles.push(new Particle(centerX, centerY, '#ffcc00'));
                    
                    if (target.hp <= 0) {
                        // Explosion effect
                        game.createExplosion(target.x * CONFIG.tileSize + CONFIG.tileSize/2, 
                                          target.y * CONFIG.tileSize + CONFIG.tileSize/2);
                        
                        if (this.owner === 'player') {
                            game.logMessage(`Unit destroyed an enemy ${target.type}!`, 'success');
                            game.sound.playExplosion();
                        }
                    } else {
                        game.sound.playRadio();
                    }
                    
                    return true;
                }
                
                return false;
            }
        }

        // Main Game Class
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.units = [];
                this.enemies = [];
                this.resources = {
                    fuel: 500,
                    ammo: 800,
                    intel: 3
                };
                this.civilianTrust = 100;
                this.selectedUnit = null;
                this.map = [];
                this.reconActive = false;
                this.sound = new SoundSystem();
                
                this.initMap();
                this.spawnUnits();
                this.setupInput();
                this.loop();
            }

            initMap() {
                // Generate a simple map with terrain types
                for (let y = 0; y < CONFIG.rows; y++) {
                    const row = [];
                    for (let x = 0; x < CONFIG.cols; x++) {
                        let type = 'grass';
                        
                        // Create some terrain features
                        if (x === 2 && y > 1 && y < 6) type = 'forest';
                        if (x === 5 && y > 1 && y < 6) type = 'forest';
                        if (y === 3 && x > 0 && x < 8) type = 'road';
                        
                        // Add a town
                        if (x === 7 && y === 2) type = 'town';
                        if (x === 1 && y === 5) type = 'town';
                        
                        row.push({
                            x, y,
                            type,
                            revealed: false // For fog of war
                        });
                    }
                    this.map.push(row);
                }
                
                // Reveal starting positions
                for (let y = 0; y < CONFIG.rows; y++) {
                    for (let x = 0; x < 3; x++) {
                        if (this.map[y][x]) {
                            this.map[y][x].revealed = true;
                        }
                    }
                }
            }

            spawnUnits() {
                // Player units
                const playerPositions = [
                    {x: 0, y: 3, type: 'infantry'},
                    {x: 1, y: 2, type: 'tank'},
                    {x: 1, y: 5, type: 'artillery'},
                    {x: 2, y: 4, type: 'infantry'}
                ];
                
                playerPositions.forEach(pos => {
                    this.units.push(new Unit(pos.x, pos.y, pos.type, 'player'));
                });

                // Enemy units
                const enemyPositions = [
                    {x: 9, y: 3, type: 'infantry'},
                    {x: 8, y: 2, type: 'tank'},
                    {x: 8, y: 5, type: 'artillery'},
                    {x: 7, y: 4, type: 'infantry'}
                ];
                
                enemyPositions.forEach(pos => {
                    this.enemies.push(new Unit(pos.x, pos.y, pos.type, 'enemy'));
                });
            }

            setupInput() {
                this.canvas.addEventListener('click', (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    const x = Math.floor((e.clientX - rect.left) / CONFIG.tileSize);
                    const y = Math.floor((e.clientY - rect.top) / CONFIG.tileSize);
                    
                    this.handleTileClick(x, y);
                });
            }

            handleTileClick(x, y) {
                if (x < 0 || x >= CONFIG.cols || y < 0 || y >= CONFIG.rows) return;

                // Check if clicked on a unit
                const clickedUnit = this.getUnitAt(x, y);
                
                if (clickedUnit && clickedUnit.owner === 'player') {
                    this.selectUnit(clickedUnit);
                } else if (this.selectedUnit) {
                    this.moveSelectedUnit(x, y);
                }
            }

            getUnitAt(x, y) {
                const playerUnit = this.units.find(u => u.x === x && u.y === y);
                if (playerUnit) return playerUnit;
                
                const enemyUnit = this.enemies.find(u => u.x === x && u.y === y);
                if (enemyUnit) return enemyUnit;
                
                return null;
            }

            selectUnit(unit) {
                this.selectedUnit = unit;
                this.sound.playSelect();
                this.updateUI();
            }

            moveSelectedUnit(targetX, targetY) {
                if (!this.selectedUnit || this.selectedUnit.moved) {
                    this.logMessage("This unit has already moved!", 'info');
                    return;
                }

                const dx = targetX - this.selectedUnit.x;
                const dy = targetY - this.selectedUnit.y;

                // Check if it's a valid move (simple distance check)
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance <= 1.5) { // Adjacent tiles
                    // Check fuel cost
                    if (this.resources.fuel >= this.selectedUnit.costFuel) {
                        if (this.selectedUnit.move(dx, dy)) {
                            this.resources.fuel -= this.selectedUnit.costFuel;
                            this.logMessage(`Unit moved to (${targetX}, ${targetY})`, 'success');
                            this.updateUI();
                        }
                    } else {
                        this.logMessage("Not enough fuel!", 'danger');
                    }
                } else {
                    // Check if attacking
                    const targetUnit = this.getUnitAt(targetX, targetY);
                    if (targetUnit && targetUnit.owner === 'enemy') {
                        if (this.selectedUnit.attack(targetUnit, this)) {
                            this.resources.ammo -= this.selectedUnit.costAmmo;
                            this.logMessage(`Attacked enemy!`, 'success');
                            
                            // Check for win condition
                            if (this.enemies.filter(e => e.hp > 0).length === 0) {
                                this.gameOver(true);
                            }
                        } else {
                            this.logMessage("Out of range!", 'info');
                        }
                    }
                }
            }

            createExplosion(x, y) {
                // Create explosion particles
                for (let i = 0; i < 20; i++) {
                    this.particles.push(new Particle(x, y, '#ff6600'));
                }
                
                // Screen shake effect
                document.body.classList.add('screen-shake');
                setTimeout(() => {
                    document.body.classList.remove('screen-shake');
                }, 500);
                
                // Damage overlay flash
                const flash = document.createElement('div');
                flash.className = 'damage-overlay';
                document.body.appendChild(flash);
                setTimeout(() => {
                    flash.remove();
                }, 500);
            }

            recon() {
                if (this.resources.intel > 0) {
                    this.resources.intel--;
                    this.reconActive = true;
                    
                    // Reveal entire map temporarily
                    for (let y = 0; y < CONFIG.rows; y++) {
                        for (let x = 0; x < CONFIG.cols; x++) {
                            this.map[y][x].revealed = true;
                        }
                    }
                    
                    this.logMessage("Recon plane deployed - enemy positions revealed!", 'info');
                    this.sound.playRadio();
                    this.updateUI();
                    
                    // Hide map again after 5 seconds
                    setTimeout(() => {
                        this.reconActive = false;
                        for (let y = 0; y < CONFIG.rows; y++) {
                            for (let x = 0; x < CONFIG.cols; x++) {
                                // Only reveal tiles near player units
                                let revealedNearPlayer = false;
                                for (const unit of this.units) {
                                    const dist = Math.sqrt(Math.pow(unit.x - x, 2) + Math.pow(unit.y - y, 2));
                                    if (dist < 3) {
                                        revealedNearPlayer = true;
                                        break;
                                    }
                                }
                                this.map[y][x].revealed = revealedNearPlayer;
                            }
                        }
                    }, 5000);
                } else {
                    this.logMessage("No reconnaissance planes available!", 'danger');
                }
            }

            advance() {
                // Move all units forward
                let movedCount = 0;
                
                for (const unit of this.units) {
                    if (!unit.moved && this.resources.fuel >= unit.costFuel) {
                        const targetX = Math.min(unit.x + unit.speed, CONFIG.cols - 1);
                        
                        if (targetX !== unit.x) {
                            unit.x = targetX;
                            this.resources.fuel -= unit.costFuel;
                            movedCount++;
                        }
                    }
                }
                
                if (movedCount > 0) {
                    this.logMessage(`All units advanced!`, 'success');
                    this.sound.playRadio();
                    this.updateUI();
                } else {
                    this.logMessage("Not enough fuel to advance all units.", 'info');
                }
            }

            defend() {
                // Set all units to defensive stance (recover HP)
                for (const unit of this.units) {
                    if (!unit.moved && unit.hp < unit.maxHp) {
                        unit.hp = Math.min(unit.hp + 10, unit.maxHp);
                        unit.moved = true;
                    }
                }
                
                this.logMessage("Units taken defensive position. HP recovered!", 'success');
                this.updateUI();
            }

            airstrike() {
                if (this.resources.fuel >= 50) {
                    this.resources.fuel -= 50;
                    
                    // Hit random enemy units
                    const activeEnemies = this.enemies.filter(e => e.hp > 0);
                    if (activeEnemies.length > 0) {
                        const target = activeEnemies[Math.floor(Math.random() * activeEnemies.length)];
                        target.hp -= 20;
                        
                        this.createExplosion(target.x * CONFIG.tileSize + CONFIG.tileSize/2, 
                                           target.y * CONFIG.tileSize + CONFIG.tileSize/2);
                        
                        this.logMessage("Airstrike delivered! Enemy unit hit.", 'success');
                        this.sound.playExplosion();
                        
                        if (target.hp <= 0) {
                            this.logMessage(`Enemy ${target.type} destroyed by airstrike!`, 'success');
                        }
                    } else {
                        this.logMessage("No enemy targets in range for airstrike.", 'info');
                    }
                    
                    this.updateUI();
                } else {
                    this.logMessage("Not enough fuel for airstrike!", 'danger');
                }
            }

            updateUnits() {
                // Reset movement status at start of turn
                for (const unit of this.units) {
                    unit.moved = false;
                }
                
                // Enemy AI - move towards player and attack
                for (const enemy of this.enemies) {
                    if (enemy.hp <= 0) continue;
                    
                    // Find closest player unit
                    let closestPlayerUnit = null;
                    let minDistance = Infinity;
                    
                    for (const unit of this.units) {
                        const dist = Math.sqrt(Math.pow(unit.x - enemy.x, 2) + Math.pow(unit.y - enemy.y, 2));
                        if (dist < minDistance) {
                            minDistance = dist;
                            closestPlayerUnit = unit;
                        }
                    }
                    
                    // Simple AI: move towards player or attack
                    if (closestPlayerUnit && minDistance <= enemy.range) {
                        // Attack if in range
                        closestPlayerUnit.hp -= enemy.damage;
                        
                        this.createExplosion(closestPlayerUnit.x * CONFIG.tileSize + CONFIG.tileSize/2,
                                           closestPlayerUnit.y * CONFIG.tileSize + CONFIG.tileSize/2);
                        
                        this.logMessage(`Enemy ${enemy.type} attacks!`, 'danger');
                        this.sound.playExplosion();
                        
                        // Damage overlay for player damage
                        const flash = document.createElement('div');
                        flash.className = 'damage-overlay';
                        document.body.appendChild(flash);
                        setTimeout(() => {
                            flash.remove();
                        }, 500);
                    } else if (closestPlayerUnit) {
                        // Move towards player
                        const dx = Math.sign(closestPlayerUnit.x - enemy.x);
                        const dy = Math.sign(closestPlayerUnit.y - enemy.y);
                        
                        let newX = enemy.x + dx;
                        let newY = enemy.y + dy;
                        
                        // Check boundaries and obstacles
                        if (newX >= 0 && newX < CONFIG.cols && newY >= 0 && newY < CONFIG.rows) {
                            enemy.x = newX;
                            enemy.y = newY;
                        }
                    }
                }
                
                // Check win/loss conditions
                const remainingPlayerUnits = this.units.filter(u => u.hp > 0);
                const remainingEnemyUnits = this.enemies.filter(e => e.hp > 0);
                
                if (remainingPlayerUnits.length === 0) {
                    this.gameOver(false);
                }
            }

            gameOver(playerWon) {
                // Clear the canvas
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Draw game over message
                this.ctx.font = '48px "Courier New"';
                this.ctx.textAlign = 'center';
                
                if (playerWon) {
                    this.ctx.fillStyle = '#33ff33';
                    this.ctx.fillText('MISSION ACCOMPLISHED!', this.canvas.width / 2, this.canvas.height / 2);
                    
                    this.ctx.font = '24px "Courier New"';
                    this.ctx.fillStyle = '#ffffff';
                    this.ctx.fillText('Enemy forces neutralized. Civilian areas secured.', this.canvas.width / 2, this.canvas.height / 2 + 50);
                } else {
                    this.ctx.fillStyle = '#ff3333';
                    this.ctx.fillText('MISSION FAILED', this.canvas.width / 2, this.canvas.height / 2);
                    
                    this.ctx.font = '24px "Courier New"';
                    this.ctx.fillStyle = '#ffffff';
                    this.ctx.fillText('All units compromised. Retreat immediately!', this.canvas.width / 2, this.canvas.height / 2 + 50);
                }
                
                // Restart button
                setTimeout(() => {
                    const restartBtn = document.createElement('button');
                    restartBtn.textContent = 'RESTART MISSION';
                    restartBtn.style.cssText = `
                        position: absolute;
                        top: ${this.canvas.offsetHeight / 2 + 100}px;
                        left: 50%;
                        transform: translateX(-50%);
                        padding: 15px 30px;
                        font-size: 24px;
                        background-color: #33ff33;
                        color: #000;
                        border: none;
                        cursor: pointer;
                        z-index: 1000;
                    `;
                    
                    restartBtn.onclick = () => location.reload();
                    document.body.appendChild(restartBtn);
                }, 2000);
            }

            updateUI() {
                // Update resource displays
                document.getElementById('fuelDisplay').textContent = this.resources.fuel;
                document.getElementById('ammoDisplay').textContent = this.resources.ammo;
                document.getElementById('intelDisplay').textContent = this.resources.intel;
                document.getElementById('civilianDisplay').textContent = `${this.civilianTrust}%`;
                
                // Update units display
                const unitsContainer = document.getElementById('unitsContainer');
                unitsContainer.innerHTML = '';
                
                for (const unit of this.units) {
                    if (unit.hp > 0) {
                        const unitDiv = document.createElement('div');
                        unitDiv.className = 'unit-card';
                        
                        const isSelected = this.selectedUnit === unit;
                        if (isSelected) {
                            unitDiv.style.border = '2px solid #33ff33';
                        }
                        
                        unitDiv.innerHTML = `
                            <div class="unit-name">${unit.type.toUpperCase()} ${isSelected ? '(SELECTED)' : ''}</div>
                            <div class="unit-stats">
                                <span class="stat-label">HP:</span>
                                <span class="stat-value">${unit.hp}/${unit.maxHp}</span>
                                <span class="stat-label">FUEL:</span>
                                <span class="stat-value">${this.resources.fuel >= unit.costFuel ? 'OK' : 'LOW'}</span>
                                <span class="stat-label">AMMO:</span>
                                <span class="stat-value">${this.resources.ammo >= unit.costAmmo ? 'OK' : 'LOW'}</span>
                            </div>
                        `;
                        
                        unitsContainer.appendChild(unitDiv);
                    }
                }
            }

            logMessage(message, type = 'info') {
                const logContainer = document.getElementById('logContainer');
                const entry = document.createElement('div');
                entry.className = `log-entry ${type}`;
                
                const timestamp = new Date().toLocaleTimeString();
                entry.textContent = `[${timestamp}] ${message}`;
                
                logContainer.appendChild(entry);
                logContainer.scrollTop = logContainer.scrollHeight;
            }

            drawMap() {
                this.ctx.fillStyle = '#1a1a1a';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                for (let y = 0; y < CONFIG.rows; y++) {
                    for (let x = 0; x < CONFIG.cols; x++) {
                        const tile = this.map[y][x];
                        
                        // Only draw revealed tiles or during recon
                        if (!tile.revealed && !this.reconActive) continue;
                        
                        let color;
                        switch (tile.type) {
                            case 'grass': color = CONFIG.colors.grass; break;
                            case 'forest': color = CONFIG.colors.forest; break;
                            case 'town': color = CONFIG.colors.town; break;
                            case 'road': color = CONFIG.colors.road; break;
                            default: color = CONFIG.colors.grass;
                        }
                        
                        this.ctx.fillStyle = color;
                        this.ctx.fillRect(x * CONFIG.tileSize, y * CONFIG.tileSize, CONFIG.tileSize, CONFIG.tileSize);
                        
                        // Draw grid lines
                        this.ctx.strokeStyle = CONFIG.colors.gridLine;
                        this.ctx.strokeRect(x * CONFIG.tileSize, y * CONFIG.tileSize, CONFIG.tileSize, CONFIG.tileSize);
                        
                        // Add some terrain details
                        if (tile.type === 'forest') {
                            this.ctx.fillStyle = '#153a18';
                            this.ctx.fillRect(x * CONFIG.tileSize + 10, y * CONFIG.tileSize + 10, 44, 44);
                        } else if (tile.type === 'town') {
                            this.ctx.fillStyle = '#9e423c';
                            this.ctx.fillRect(x * CONFIG.tileSize + 8, y * CONFIG.tileSize + 8, 48, 48);
                            // Windows
                            this.ctx.fillStyle = '#ffffcc';
                            this.ctx.fillRect(x * CONFIG.tileSize + 15, y * CONFIG.tileSize + 15, 10, 10);
                        }
                    }
                }
            }

            drawUnits() {
                // Draw player units
                for (const unit of this.units) {
                    if (unit.hp <= 0) continue;
                    
                    const centerX = unit.x * CONFIG.tileSize + CONFIG.tileSize / 2;
                    const centerY = unit.y * CONFIG.tileSize + CONFIG.tileSize / 2;
                    
                    // Draw unit base
                    this.ctx.fillStyle = '#3366ff';
                    if (unit.type === 'tank') {
                        this.ctx.fillRect(unit.x * CONFIG.tileSize + 15, unit.y * CONFIG.tileSize + 15, 34, 34);
                    } else if (unit.type === 'artillery') {
                        this.ctx.beginPath();
                        this.ctx.arc(centerX, centerY, 20, 0, Math.PI * 2);
                        this.ctx.fill();
                    } else {
                        // Infantry
                        this.ctx.beginPath();
                        this.ctx.arc(centerX, centerY, 15, 0, Math.PI * 2);
                        this.ctx.fill();
                    }
                    
                    // Selection indicator
                    if (this.selectedUnit === unit) {
                        this.ctx.strokeStyle = '#33ff33';
                        this.ctx.lineWidth = 2;
                        this.ctx.strokeRect(unit.x * CONFIG.tileSize - 5, unit.y * CONFIG.tileSize - 5, 
                                          CONFIG.tileSize + 10, CONFIG.tileSize + 10);
                    }
                    
                    // Health bar
                    const hpPercent = unit.hp / unit.maxHp;
                    this.ctx.fillStyle = '#ff3333';
                    this.ctx.fillRect(unit.x * CONFIG.tileSize + 5, unit.y * CONFIG.tileSize - 8, 
                                    CONFIG.tileSize - 10, 4);
                    
                    this.ctx.fillStyle = '#33ff33';
                    this.ctx.fillRect(unit.x * CONFIG.tileSize + 5, unit.y * CONFIG.tileSize - 8, 
                                    (CONFIG.tileSize - 10) * hpPercent, 4);
                }
                
                // Draw enemy units
                for (const enemy of this.enemies) {
                    if (enemy.hp <= 0) continue;
                    
                    // Only draw enemies that are revealed (near player units or during recon)
                    let shouldDraw = this.reconActive;
                    
                    for (const unit of this.units) {
                        const dist = Math.sqrt(Math.pow(unit.x - enemy.x, 2) + Math.pow(unit.y - enemy.y, 2));
                        if (dist < 3) {
                            shouldDraw = true;
                            break;
                        }
                    }
                    
                    if (!shouldDraw) continue;
                    
                    const centerX = enemy.x * CONFIG.tileSize + CONFIG.tileSize / 2;
                    const centerY = enemy.y * CONFIG.tileSize + CONFIG.tileSize / 2;
                    
                    // Draw enemy unit
                    this.ctx.fillStyle = '#ff3333';
                    if (enemy.type === 'tank') {
                        this.ctx.fillRect(enemy.x * CONFIG.tileSize + 15, enemy.y * CONFIG.tileSize + 15, 34, 34);
                    } else if (enemy.type === 'artillery') {
                        this.ctx.beginPath();
                        this.ctx.arc(centerX, centerY, 20, 0, Math.PI * 2);
                        this.ctx.fill();
                    } else {
                        // Infantry
                        this.ctx.beginPath();
                        this.ctx.arc(centerX, centerY, 15, 0, Math.PI * 2);
                        this.ctx.fill();
                    }
                    
                    // Health bar
                    const hpPercent = enemy.hp / enemy.maxHp;
                    this.ctx.fillStyle = '#ff3333';
                    this.ctx.fillRect(enemy.x * CONFIG.tileSize + 5, enemy.y * CONFIG.tileSize - 8, 
                                    CONFIG.tileSize - 10, 4);
                    
                    this.ctx.fillStyle = '#33ff33';
                    this.ctx.fillRect(enemy.x * CONFIG.tileSize + 5, enemy.y * CONFIG.tileSize - 8, 
                                    (CONFIG.tileSize - 10) * hpPercent, 4);
                }
            }

            drawParticles() {
                for (const particle of this.particles) {
                    particle.update();
                    particle.draw(this.ctx);
                }
                
                // Remove dead particles
                this.particles = this.particles.filter(p => p.life > 0);
            }

            loop() {
                // Clear canvas
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Draw map and units
                this.drawMap();
                this.drawUnits();
                
                // Draw particles
                this.drawParticles();
                
                // Update game logic
                this.updateUnits();
                
                // Update UI
                this.updateUI();
                
                requestAnimationFrame(() => this.loop());
            }
        }

        // Start the game when page loads
        window.onload = () => {
            window.game = new Game();
            game.logMessage("Welcome, General. Enemy forces detected in sector.", 'info');
            game.logMessage("Select units and command your troops to victory!", 'success');
        };
    </script>
</body>
</html>
