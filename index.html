<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Normandy Sky: Bomber Command</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        #gameCanvas {
            display: block;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        
        .hud-panel {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        .hud-item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }
        
        .hud-label {
            width: 80px;
            font-weight: bold;
            color: #33ff33;
        }
        
        .hud-value {
            font-size: 24px;
            font-weight: bold;
            color: white;
        }
        
        .center-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
        }
        
        h1 {
            color: white;
            font-size: 48px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); text-shadow: 3px 3px 6px rgba(0,0,0,0.5); }
            50% { transform: scale(1.05); text-shadow: 4px 4px 8px rgba(0,0,0,0.7); }
        }
        
        button {
            background: linear-gradient(to bottom, #33ff33, #2a992a);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 6px rgba(0,100,0,0.3);
            transition: all 0.1s;
            margin-top: 20px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px rgba(0,100,0,0.4);
        }
        
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px rgba(0,100,0,0.3);
        }
        
        .tutorial-text {
            color: white;
            font-size: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-top: 20px;
            max-width: 600px;
            line-height: 1.5;
        }
        
        .mission-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #ffcc00;
        }
        
        .mission-counter h3 {
            color: #ffcc00;
            margin: 0 0 10px 0;
        }
        
        .progress-bar {
            width: 200px;
            height: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #ffcc00, #ff6600);
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-overlay">
        <div class="hud-panel">
            <div class="hud-item">
                <span class="hud-label">TARGETS:</span>
                <span class="hud-value" id="targetsValue">0/10</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">HP:</span>
                <span class="hud-value" id="hpValue">100%</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">FUEL:</span>
                <span class="hud-value" id="fuelValue">100%</span>
            </div>
        </div>
    </div>
    
    <div class="mission-counter">
        <h3>MISSION PROGRESS</h3>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>
    
    <div id="startScreen" class="center-screen">
        <h1>NORMANDY SKY</h1>
        <p style="color: white; font-size: 24px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">BOMBER COMMAND</p>
        
        <div class="tutorial-text">
            <strong>MISSION:</strong> Bomb enemy targets in Normandy<br><br>
            <strong>CONTROLS:</strong> Move mouse to steer • Click to drop bombs<br>
            <strong>AVOID:</strong> Flak cannons and enemy fighters!
        </div>
        
        <button id="startButton">START MISSION</button>
    </div>
    
    <div id="gameOverScreen" class="center-screen" style="display: none;">
        <h1 id="gameOverTitle">MISSION ACCOMPLISHED!</h1>
        <p class="tutorial-text" id="gameOverMessage">
            Enemy targets neutralized. Good flying, pilot!
        </p>
        <button onclick="location.reload()">FLY AGAIN</button>
    </div>

    <script>
        // Game configuration
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();
        
        // Game state
        const game = {
            running: false,
            targetsDestroyed: 0,
            totalTargets: 10,
            hp: 100,
            fuel: 100,
            mouseX: width / 2,
            mouseY: height / 2,
            time: 0
        };
        
        // Sound system (Web Audio API)
        class SoundSystem {
            constructor() {
                this.enabled = true;
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.audioContext.createGain();
                    this.masterGain.gain.value = 0.3;
                    this.masterGain.connect(this.audioContext.destination);
                } catch (e) {
                    console.log("Web Audio API not supported");
                    this.enabled = false;
                }
            }
            
            playTone(freq, type, duration, startTime = 0) {
                if (!this.enabled || !this.audioContext) return;
                
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                
                oscillator.type = type;
                oscillator.frequency.setValueAtTime(freq, this.audioContext.currentTime + startTime);
                
                gainNode.gain.setValueAtTime(0.2, this.audioContext.currentTime + startTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + startTime + duration);
                
                oscillator.connect(gainNode);
                gainNode.connect(this.masterGain);
                
                oscillator.start(this.audioContext.currentTime + startTime);
                oscillator.stop(this.audioContext.currentTime + startTime + duration);
            }
            
            playBombDrop() {
                if (!this.enabled || !this.audioContext) return;
                // Whoosh sound
                for (let i = 0; i < 3; i++) {
                    this.playTone(200 - i * 50, 'sine', 0.3, i * 0.1);
                }
            }
            
            playExplosion() {
                if (!this.enabled || !this.audioContext) return;
                // Low frequency explosion
                const startTime = this.audioContext.currentTime;
                
                // Main boom
                const oscillator1 = this.audioContext.createOscillator();
                const gain1 = this.audioContext.createGain();
                oscillator1.type = 'sawtooth';
                oscillator1.frequency.setValueAtTime(100, startTime);
                oscillator1.frequency.exponentialRampToValueAtTime(20, startTime + 0.5);
                
                gain1.gain.setValueAtTime(0.4, startTime);
                gain1.gain.exponentialRampToValueAtTime(0.01, startTime + 0.8);
                
                oscillator1.connect(gain1);
                gain1.connect(this.masterGain);
                oscillator1.start(startTime);
                oscillator1.stop(startTime + 0.8);
            }
            
            playFlak() {
                if (!this.enabled || !this.audioContext) return;
                // Crackling sound
                const startTime = this.audioContext.currentTime;
                
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        const osc = this.audioContext.createOscillator();
                        const gain = this.audioContext.createGain();
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(800 + Math.random() * 400, startTime);
                        
                        gain.gain.setValueAtTime(0.1, startTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.15);
                        
                        osc.connect(gain);
                        gain.connect(this.masterGain);
                        osc.start(startTime);
                        osc.stop(startTime + 0.15);
                    }, i * 30);
                }
            }
            
            playEngine() {
                if (!this.enabled || !this.audioContext) return;
                // Continuous engine hum
                const startTime = this.audioContext.currentTime;
                
                for (let i = 0; i < 4; i++) {
                    this.playTone(150 + i * 20, 'triangle', 0.5, i * 0.1);
                }
            }
            
            playMissionComplete() {
                if (!this.enabled || !this.audioContext) return;
                // Victory fanfare
                const startTime = this.audioContext.currentTime;
                
                for (let note of [440, 554, 659, 880]); { // A major chord
                    setTimeout(() => {
                        this.playTone(note, 'sine', 1.0, 0);
                    }, (note - 440) / 220 * 300);
                }
            }
        }
        
        const sound = new SoundSystem();
        
        // Particle system
        class Particle {
            constructor(x, y, type, color) {
                this.x = x;
                this.y = y;
                this.type = type; // 'fire', 'smoke', 'debris', 'tracer'
                this.life = 60;
                this.maxLife = 60;
                
                if (type === 'fire') {
                    this.size = Math.random() * 15 + 5;
                    this.speedX = (Math.random() - 0.5) * 8;
                    this.speedY = (Math.random() - 0.5) * 8 - 2;
                    this.color = color || `hsl(${30 + Math.random() * 40}, ${100}%, ${60 + Math.random() * 30}%)`;
                } else if (type === 'smoke') {
                    this.size = Math.random() * 20 + 10;
                    this.speedX = (Math.random() - 0.5) * 4;
                    this.speedY = -1;
                    this.color = `rgba(80, 80, 80, ${Math.random() * 0.5})`;
                } else if (type === 'debris') {
                    this.size = Math.random() * 5 + 2;
                    this.speedX = (Math.random() - 0.5) * 15;
                    this.speedY = (Math.random() - 0.5) * 15;
                    this.color = color || '#8B4513';
                } else if (type === 'tracer') {
                    this.size = 2;
                    this.speedX = (Math.random() - 0.5) * 2;
                    this.speedY = Math.random() * 2 + 2;
                    this.color = color || '#ff6600';
                } else if (type === 'water') {
                    this.size = Math.random() * 10 + 5;
                    this.speedX = (Math.random() - 0.5) * 4;
                    this.speedY = -2;
                    this.color = `rgba(30, 144, 255, ${Math.random() * 0.6})`;
                }
                
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life--;
                this.rotation += this.rotationSpeed;
                
                if (this.type === 'fire') {
                    this.size *= 0.95;
                    this.speedY -= 0.1; // rise up
                } else if (this.type === 'smoke') {
                    this.size *= 1.02;
                    this.speedX += (Math.random() - 0.5) * 0.5;
                } else if (this.type === 'debris') {
                    this.speedY += 0.3; // gravity
                    this.speedX *= 0.98; // friction
                } else if (this.type === 'tracer') {
                    this.size *= 0.9;
                }
            }
            
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                if (this.type === 'smoke') {
                    ctx.fillStyle = `rgba(80, 80, 80, ${Math.min(1, this.life / 30)})`;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = Math.min(1, this.life / 20);
                    
                    if (this.type === 'tracer') {
                        ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size * 3);
                    } else if (this.type === 'debris') {
                        ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                    } else {
                        // Fire
                        const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                        if (this.type === 'fire') {
                            gradient.addColorStop(0, '#ffff00');
                            gradient.addColorStop(0.5, '#ff6600');
                            gradient.addColorStop(1, '#cc3300');
                        } else if (this.type === 'water') {
                            gradient.addColorStop(0, '#87CEEB');
                            gradient.addColorStop(1, 'rgba(30, 144, 255, 0.6)');
                        }
                        
                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                
                ctx.restore();
            }
        }
        
        // Background clouds
        class Cloud {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.7;
                this.size = Math.random() * 40 + 20;
                this.speed = Math.random() * 1 + 0.5;
                this.opacity = Math.random() * 0.3 + 0.1;
            }
            
            update() {
                this.x -= this.speed;
                if (this.x < -100) this.x = width + 100;
            }
            
            draw(ctx) {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.arc(this.x + this.size * 0.7, this.y - this.size * 0.3, this.size * 0.8, 0, Math.PI * 2);
                ctx.arc(this.x - this.size * 0.5, this.y + this.size * 0.2, this.size * 0.6, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // Ground objects
        class GroundObject {
            constructor(x, type) {
                this.x = x;
                this.type = type; // 'tank', 'bunker', 'artillery', 'cannon'
                this.width = type === 'tank' ? 40 : type === 'bunker' ? 80 : 30;
                this.height = type === 'tank' ? 25 : type === 'bunker' ? 40 : 20;
                this.y = height - this.height - 20;
                this.active = true;
                
                // Create particles when destroyed
                this.destructionParticles = [];
            }
            
            draw(ctx) {
                if (!this.active) return;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                
                switch (this.type) {
                    case 'tank':
                        // Tank body
                        ctx.fillStyle = '#654321';
                        ctx.fillRect(0, 10, this.width, this.height - 10);
                        // Turret
                        ctx.fillStyle = '#8B4513';
                        ctx.beginPath();
                        ctx.arc(this.width / 2, 10, this.width / 2.5, Math.PI, 0);
                        ctx.fill();
                        // Barrel
                        ctx.fillStyle = '#4a3b2a';
                        ctx.fillRect(this.width / 2 + 5, 5, this.width, 6);
                        break;
                        
                    case 'bunker':
                        // Bunker structure
                        ctx.fillStyle = '#808080';
                        ctx.fillRect(0, 10, this.width, this.height - 10);
                        // Roof
                        ctx.beginPath();
                        ctx.moveTo(0, 10);
                        ctx.lineTo(this.width / 2, -15);
                        ctx.lineTo(this.width, 10);
                        ctx.closePath();
                        ctx.fill();
                        // Machicolations
                        for (let i = 0; i < this.width; i += 20) {
                            ctx.fillRect(i + 5, 10, 10, 15);
                        }
                        break;
                        
                    case 'artillery':
                        // Artillery piece
                        ctx.fillStyle = '#654321';
                        ctx.fillRect(0, 15, this.width, this.height - 15);
                        // Barrel
                        ctx.fillStyle = '#8B4513';
                        ctx.beginPath();
                        ctx.arc(this.width / 2, 15, 8, Math.PI, 0);
                        ctx.fill();
                        break;
                        
                    case 'cannon':
                        // Anti-aircraft cannon
                        ctx.fillStyle = '#777777';
                        ctx.fillRect(0, 15, this.width, this.height - 15);
                        // Gun barrel
                        ctx.strokeStyle = '#555555';
                        ctx.lineWidth = 4;
                        ctx.beginPath();
                        ctx.moveTo(this.x + this.width / 2, 15);
                        ctx.lineTo(this.x + this.width / 2 + 30, 5);
                        ctx.stroke();
                        break;
                }
                
                ctx.restore();
            }
            
            createExplosion() {
                this.active = false;
                sound.playExplosion();
                
                // Create explosion particles
                for (let i = 0; i < 30; i++) {
                    game.particles.push(new Particle(this.x + this.width/2, this.y + this.height/2, 'fire'));
                }
                for (let i = 0; i < 15; i++) {
                    game.particles.push(new Particle(this.x + this.width/2, this.y + this.height/2, 'smoke'));
                }
                for (let i = 0; i < 20; i++) {
                    game.particles.push(new Particle(this.x + this.width/2, this.y + this.height/2, 'debris'));
                }
                
                // Screen shake
                canvas.style.transform = 'translate(5px, 5px)';
                setTimeout(() => {
                    canvas.style.transform = 'none';
                }, 100);
            }
        }
        
        // Flak cannon
        class FlakCannon {
            constructor(x) {
                this.x = x;
                this.y = height - 40;
                this.targetX = width / 2;
                this.targetY = height / 2;
                this.lastShot = 0;
                this.shootInterval = Math.random() * 150 + 100; // Random interval
            }
            
            update(playerX, playerY) {
                // Update target based on player position
                if (game.time - this.lastShot > this.shootInterval) {
                    this.shoot();
                    this.lastShot = game.time;
                    this.shootInterval = Math.random() * 150 + 80; // Change interval
                }
            }
            
            shoot() {
                sound.playFlak();
                
                // Create tracers
                for (let i = 0; i < 3; i++) {
                    game.particles.push(new Particle(
                        this.x,
                        this.y - 10,
                        'tracer',
                        `rgba(255, ${Math.random() * 100 + 155}, 0, 0.8)`
                    ));
                }
            }
            
            draw(ctx) {
                // Draw cannon
                ctx.fillStyle = '#666666';
                ctx.fillRect(this.x - 10, this.y - 20, 20, 20);
                
                // Barrel
                ctx.strokeStyle = '#444444';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y - 20);
                ctx.lineTo(this.x + Math.sin(game.time * 0.01) * 30, this.y - 50);
                ctx.stroke();
                
                // Base
                ctx.fillStyle = '#333333';
                ctx.fillRect(this.x - 15, this.y, 30, 20);
            }
        }
        
        // Bomber aircraft
        class Bomber {
            constructor() {
                this.x = width / 4;
                this.y = height / 3;
                this.width = 80;
                this.height = 30;
                this.speedX = 2;
                this.targetY = height / 3;
                this.bankAngle = 0;
            }
            
            update() {
                // Smooth movement toward mouse Y
                const dy = game.mouseY - this.y;
                this.y += dy * 0.1;
                
                // Calculate bank angle based on movement
                this.bankAngle = Math.max(-0.3, Math.min(0.3, -dy * 0.002));
                
                // Engine sound loop
                if (game.time % 15 === 0) {
                    sound.playEngine();
                }
            }
            
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.bankAngle);
                
                // Draw B-17 bomber (simplified)
                
                // Fuselage
                ctx.fillStyle = '#C0C0C0';
                ctx.beginPath();
                ctx.ellipse(0, 0, this.width/2, this.height/3, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Wings
                ctx.fillStyle = '#A9A9A9';
                ctx.fillRect(-this.width/4, -5, this.width/2, 10);
                
                // Tail
                ctx.beginPath();
                ctx.moveTo(-this.width/2 + 10, -5);
                ctx.lineTo(-this.width/2 - 15, -25);
                ctx.lineTo(-this.width/2 - 5, -5);
                ctx.fill();
                
                // Engine nacelles
                for (let i = 0; i < 3; i++) {
                    const x = -this.width/4 + i * this.width/6;
                    ctx.fillStyle = '#808080';
                    ctx.beginPath();
                    ctx.arc(x, 5, 8, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Propellers
                    if (game.time % 3 === 0) {
                        ctx.strokeStyle = '#4a4a4a';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(x - 12, 5);
                        ctx.lineTo(x + 12, 5);
                        ctx.stroke();
                    }
                }
                
                // Bomb bay doors
                ctx.fillStyle = '#696969';
                ctx.fillRect(-20, 5, 40, 5);
                
                ctx.restore();
            }
            
            dropBomb() {
                if (game.fuel > 5) {
                    game.bombs.push(new Bomb(this.x, this.y + 15));
                    sound.playBombDrop();
                    game.fuel -= 5;
                    
                    // Small explosion effect
                    for (let i = 0; i < 5; i++) {
                        game.particles.push(new Particle(this.x, this.y + 25, 'smoke'));
                    }
                } else {
                    // Empty fuel warning
                    ctx.fillStyle = '#ff3333';
                    ctx.font = '24px Courier New';
                    ctx.textAlign = 'center';
                    ctx.fillText("WARNING: LOW FUEL!", width/2, height - 50);
                }
            }
        }
        
        // Bomb class
        class Bomb {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.speedY = 5;
                this.trail = [];
                this.exploded = false;
            }
            
            update() {
                if (this.exploded) return;
                
                this.y += this.speedY;
                this.speedY += 0.2; // gravity
                
                // Add trail
                this.trail.push({x: this.x, y: this.y, life: 15});
                if (this.trail.length > 8) {
                    this.trail.shift();
                }
                
                // Check ground collision
                if (this.y >= height - 20) {
                    this.explode();
                }
            }
            
            explode() {
                this.exploded = true;
                
                // Create explosion particles
                for (let i = 0; i < 40; i++) {
                    game.particles.push(new Particle(this.x, this.y - 5, 'fire'));
                }
                for (let i = 0; i < 20; i++) {
                    game.particles.push(new Particle(this.x, this.y - 5, 'smoke'));
                }
                for (let i = 0; i < 30; i++) {
                    game.particles.push(new Particle(this.x, this.y - 5, 'debris'));
                }
                
                // Check target hits
                game.groundObjects.forEach(obj => {
                    if (obj.active) {
                        const dx = obj.x + obj.width/2 - this.x;
                        const dy = obj.y + obj.height/2 - (this.y - 5);
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        
                        if (dist < 60) { // Explosion radius
                            obj.createExplosion();
                            game.targetsDestroyed++;
                            
                            // Check win condition
                            if (game.targetsDestroyed >= game.totalTargets) {
                                setTimeout(() => {
                                    game.running = false;
                                    document.getElementById('startScreen').style.display = 'none';
                                    document.getElementById('gameOverScreen').style.display = 'block';
                                    document.getElementById('gameOverTitle').textContent = "MISSION ACCOMPLISHED!";
                                    document.getElementById('gameOverMessage').innerHTML = `
                                        All enemy targets neutralized.<br>
                                        Good flying, pilot!<br><br>
                                        Targets Destroyed: ${game.targetsDestroyed}/${game.totalTargets}
                                    `;
                                    sound.playMissionComplete();
                                }, 2000);
                            }
                        }
                    }
                });
            }
            
            draw(ctx) {
                if (this.exploded) return;
                
                // Draw trail
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                if (this.trail.length > 0) {
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                }
                ctx.stroke();
                
                // Draw bomb
                ctx.fillStyle = '#333333';
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, 5, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = '#ff6600';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(this.x - 3, this.y + 8);
                ctx.lineTo(this.x + 3, this.y + 8);
                ctx.stroke();
            }
        }
        
        // Initialize game objects
        let clouds = [];
        let groundObjects = [];
        let flakCannons = [];
        let bombs = [];
        let particles = [];
        let bomber;
        
        function initGame() {
            clouds = [];
            for (let i = 0; i < 15; i++) {
                clouds.push(new Cloud());
            }
            
            groundObjects = [];
            // Create targets along the path
            const targetPositions = [300, 500, 700, 900, 1100, 1300, 1500, 1700, 1900, 2100];
            
            for (let i = 0; i < targetPositions.length; i++) {
                const types = ['tank', 'bunker', 'artillery', 'cannon'];
                const type = types[Math.floor(Math.random() * types.length)];
                groundObjects.push(new GroundObject(targetPositions[i], type));
            }
            
            // Create flak cannons
            flakCannons = [];
            for (let i = 0; i < 6; i++) {
                flakCannons.push(new FlakCannon(400 + i * 250));
            }
            
            bombs = [];
            particles = [];
            bomber = new Bomber();
        }
        
        // Input handling
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            game.mouseX = e.clientX - rect.left;
            game.mouseY = e.clientY - rect.top;
        });
        
        window.addEventListener('mousedown', () => {
            if (game.running && bomber) {
                bomber.dropBomb();
            }
        });
        
        // Touch support for mobile
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            game.mouseX = e.touches[0].clientX - rect.left;
            game.mouseY = e.touches[0].clientY - rect.top;
        }, {passive: false});
        
        window.addEventListener('touchstart', () => {
            if (game.running && bomber) {
                bomber.dropBomb();
            }
        });
        
        // Main game loop
        function update() {
            if (!game.running) return;
            
            game.time++;
            
            // Update clouds
            clouds.forEach(cloud => cloud.update());
            
            // Update bomber
            bomber.update();
            
            // Update flak cannons
            flakCannons.forEach(cannon => cannon.update(bomber.x, bomber.y));
            
            // Update bombs
            bombs = bombs.filter(bomb => !bomb.exploded);
            bombs.forEach(bomb => bomb.update());
            
            // Remove exploded bombs after a delay
            if (game.time % 60 === 0) {
                bombs = bombs.filter(bomb => game.time - bomb.trail[bomb.trail.length-1]?.y < height + 100 || !bomb.exploded);
            }
            
            // Update particles
            particles = particles.filter(particle => particle.life > 0);
            particles.forEach(particle => particle.update());
            
            // Update UI
            updateUI();
        }
        
        function draw() {
            // Clear canvas with sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#E0F7FA');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // Draw clouds
            clouds.forEach(cloud => cloud.draw(ctx));
            
            // Draw ground
            const groundGradient = ctx.createLinearGradient(0, height - 100, 0, height);
            groundGradient.addColorStop(0, '#228B22');
            groundGradient.addColorStop(0.5, '#32CD32');
            groundGradient.addColorStop(1, '#66CDAA');
            ctx.fillStyle = groundGradient;
            ctx.fillRect(0, height - 100, width, 100);
            
            // Draw ground objects
            groundObjects.forEach(obj => obj.draw(ctx));
            
            // Draw flak cannons
            flakCannons.forEach(cannon => cannon.draw(ctx));
            
            // Draw bombs
            bombs.forEach(bomb => bomb.draw(ctx));
            
            // Draw bomber
            if (bomber) bomber.draw(ctx);
            
            // Draw particles
            particles.forEach(particle => particle.draw(ctx));
        }
        
        function updateUI() {
            document.getElementById('targetsValue').textContent = `${game.targetsDestroyed}/${game.totalTargets}`;
            document.getElementById('hpValue').textContent = `${Math.ceil(game.hp)}%`;
            document.getElementById('fuelValue').textContent = `${Math.ceil(game.fuel)}%`;
            
            const progressPercent = (game.targetsDestroyed / game.totalTargets) * 100;
            document.getElementById('progressFill').style.width = `${progressPercent}%`;
        }
        
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        
        // Start button
        document.getElementById('startButton').addEventListener('click', () => {
            document.getElementById('startScreen').style.display = 'none';
            
            initGame();
            game.running = true;
            
            // Update UI initially
            updateUI();
        });
        
        // Initialize for first draw (before start)
        resize();
        
        // Start the loop (it will just draw background until game starts)
        loop();
    </script>
</body>
</html>
