<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESIDENTIAL TERMINAL - SYSTEM MILTON v2.1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0d1b0a;
            font-family: 'Courier Prime', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .monitor {
            width: 95vw;
            height: 95vh;
            background: #0d1b0a;
            border-radius: 3px;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 40px rgba(0,255,0,0.2),
                inset 0 0 60px rgba(0,0,0,0.7);
        }
        
        .scanlines {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0%,
                rgba(0, 255, 0, 0.03) 50%,
                transparent 100%
            );
            pointer-events: none;
            z-index: 10;
        }
        
        .phosphor {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,50,0,0.4) 100%);
            pointer-events: none;
            z-index: 9;
        }
        
        .screen {
            padding: 25px 30px;
            height: calc(100% - 60px);
            overflow: hidden;
            color: #4af626;
            text-shadow:
                0 0 5px rgba(74,246,38,0.6),
                0 0 10px rgba(74,246,38,0.3);
        }
        
        .header {
            font-size: 14px;
            margin-bottom: 15px;
            border-bottom: 2px solid #4af626;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        
        .status-line { font-size: 12px; margin-bottom: 8px; color: #4af626; opacity: 0.9; }
        
        .message-area {
            flex-grow: 1;
            overflow-y: auto;
            position: relative;
        }
        
        .message-area::-webkit-scrollbar { width: 8px; }
        .message-area::-webkit-scrollbar-thumb { background: rgba(74,246,38,0.3); }
        
        .msg { margin-bottom: 12px; line-height: 1.5; white-space: pre-wrap; }
        .msg.system { color: #4af626; }
        .msg.president { color: #ffcc00; }
        .msg.warning { 
            color: #ff6b35; 
            text-shadow: 0 0 5px rgba(255,107,53,0.6), 0 0 10px rgba(255,107,53,0.3);
        }
        .msg.danger { 
            color: #ff4757; 
            text-shadow: 0 0 5px rgba(255,71,87,0.6), 0 0 10px rgba(255,71,87,0.3);
        }
        .msg.success { color: #4af626; }
        
        .cmd-line { margin-top: 10px; font-size: 14px; display: flex; align-items: center; }
        .prompt { color: #ffcc00; margin-right: 8px; }
        
        input[type="text"] {
            background: transparent;
            border: none;
            color: #4af626;
            font-family: 'Courier Prime', monospace;
            font-size: 14px;
            width: calc(100% - 80px);
            outline: none;
            text-shadow: 0 0 5px rgba(74,246,38,0.6), 0 0 10px rgba(74,246,38,0.3);
        }
        
        .typing-cursor { display: inline-block; width: 10px; height: 18px; background: #4af626; animation: blink 1s infinite; vertical-align: middle; }
        
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
        
        .dashboard {
            position: absolute; top: 60px; right: 20px;
            width: 280px; background: rgba(13,27,10,0.9);
            border: 1px solid #4af626; padding: 15px; font-size: 11px;
        }
        
        .dash-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .dash-label { color: #4af626; opacity: 0.8; }
        .dash-value { color: #ffcc00; }
        
        .turn-indicator { position: absolute; bottom: 5px; left: 20px; font-size: 11px; opacity: 0.7; }
        .help-text { position: absolute; bottom: 30px; right: 20px; font-size: 10px; color: #4af626; opacity: 0.5; text-align: right; }
    </style>
</head>
<body>
    <div class="monitor">
        <div class="scanlines"></div>
        <div class="phosphor"></div>
        
        <div class="screen" onclick="document.getElementById('cmd').focus()">
            <div class="header">
                <span>PRESIDENTIAL TERMINAL // SYSTEM MILTON v2.1</span>
                <span>DATE: Q<span id="qtr">1</span>/2026</span>
            </div>
            
            <div class="status-line" id="statusLine">CONNECTED TO WHITEHOUSE SECURE TERMINAL [ENCRYPTED]</div>
            
            <div class="message-area" id="msgArea"></div>
            
            <div class="turn-indicator" id="turnIndicator">TURN: 1/8</div>
            
            <div class="dashboard" id="dashboard"></div>
            
            <div class="help-text" id="helpText">TYPE COMMANDS BELOW | PRESS ENTER TO SUBMIT</div>
            
            <div class="cmd-line">
                <span class="prompt">POTUS@WHITEHOUSE:~$</span>
                <input type="text" id="cmd" placeholder="Enter command..." autofocus autocomplete="off">
            </div>
        </div>
    </div>

    <script>
        const state = {
            turn: 1, maxTurns: 8, gdp: 4.2, unemployment: 3.8, inflation: 2.1,
            approval: 58, fedCredibility: 72, transparency: 60, oilPrice: 75, typingSpeed: 25
        };

        const msgArea = document.getElementById('msgArea');
        const cmdInput = document.getElementById('cmd');
        const dashboard = document.getElementById('dashboard');
        
        function miltonSpeak(text, type = 'system') {
            return new Promise(resolve => {
                addMessage(text, type);
                resolve();
            });
        }

        async function addMessage(text, type = 'system') {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${type}`;
            msgArea.insertBefore(msgDiv, msgArea.firstChild);
            
            while (msgArea.children.length > 12) {
                msgArea.removeChild(msgArea.lastChild);
            }
            
            let i = 0;
            const typeInterval = setInterval(() => {
                msgDiv.textContent += text.charAt(i);
                i++;
                if (i >= text.length) clearInterval(typeInterval);
            }, 1000 / state.typingSpeed);
        }

        function buildDashboard() {
            const gdpColor = state.gdp < 1.5 ? '#ff4757' : state.gdp > 3.0 ? '#4af626' : '#ffcc00';
            const unempColor = state.unemployment > 5.0 ? '#ff4757' : state.unemployment < 3.5 ? '#ffcc00' : '#4af626';
            const infColor = state.inflation > 3.0 ? '#ff4757' : state.inflation < 1.5 ? '#4af626' : '#ffcc00';
            
            dashboard.innerHTML = `
                <div style="font-size:11px; font-weight:bold; margin-bottom:8px; color:#4af626;">ECONOMIC DASHBOARD</div>
                <div class="dash-row"><span class="dash-label">GDP GROWTH:</span><span class="dash-value" style="color:${gdpColor}">${state.gdp.toFixed(1)}%</span></div>
                <div class="dash-row"><span class="dash-label">UNEMPLOYMENT:</span><span class="dash-value" style="color:${unempColor}">${state.unemployment.toFixed(1)}%</span></div>
                <div class="dash-row"><span class="dash-label">INFLATION (PCE):</span><span class="dash-value" style="color:${infColor}">${state.inflation.toFixed(1)}%</span></div>
                <div class="dash-row"><span class="dash-label">APPROVAL:</span><span class="dash-value" style="color:#ffcc00">${Math.round(state.approval)}%</span></div>
                <div class="dash-row"><span class="dash-label">FED CREDIBILITY:</span><span class="dash-value">${Math.round(state.fedCredibility)}%</span></div>
                <div class="dash-row" style="margin-top:8px; border-top:1px solid #4af626; padding-top:5px;"><span class="dash-label">OIL PRICE:</span><span class="dash-value">$${state.oilPrice.toFixed(0)}/bbl</span></div>
            `;
        }

        const miltonResponses = {
            intro: '\nSYSTEM MILTON INITIALIZING...\n\nWELCOME PRESIDENT TRUMP.\nI AM MILTON - YOUR ECONOMIC ADVISORY SYSTEM.\nI OPERATE ON A SIMPLE PRINCIPLE:\nINCENTIVES MATTER MORE THAN INTENTIONS.\n\nLET ME SHOW YOU HOW POLICY WORKS.\nEACH DECISION CREATES TRADE-OFFS.\nTHERE ARE NO FREE LUNCHES.\nONLY DIFFERENT COSTS AND DIFFERENT WINNERS.\n\nREADY TO BEGIN?',
            
            turn1: `\nTURN 1 - Q1 2026\nGROWTH IS 4.2% (STRONG)\nUNEMPLOYMENT AT 3.8% (FULL EMPLOYMENT)\nINFLATION COOLED TO 2.1%\nBUT OIL PRICES ARE CLIMBING TOWARD $75/BBL\n\nWHAT DO YOU COMMAND?\n                \nAVAILABLE ACTIONS:\n1. CUT_RATES - PRESSURE FED TO LOWER INTEREST RATES (MARKET RALLY NOW)\n2. INCREASE_SPENDING - NEW INFRASTRUCTURE PACKAGE (+$50B DEFICIT)\n3. SUPPRESS_WAGES - LIMIT WAGE GROWTH TO CONTROL INFLATION\n4. DO_NOTHING - TRUST INSTITUTIONS, LET MARKET WORK`,
            
            turn2: `\nTURN 2 - Q2 2026\n${state.turn > 1 ? 'YOUR DECISION HAS BEEN IMPLEMENTED.' : ''}\nINFLATION IS NOW ${state.inflation.toFixed(1)}%\nAPPROVAL AT ${Math.round(state.approval)}%\nWHAT'S NEXT?\n                \nAVAILABLE ACTIONS:\n1. SUPPRESS_WAGES - CONTINUE WAGE RESTRAINT\n2. TARIFFS - IMPOSE NEW TRADE TARIFFS ON CHINA/EU\n3. CUT_SPENDING - REDUCE DEFICIT TO COOL INFLATION\n4. PRESSURE_FED - PUBLICLY CRITICIZE FED POLICY`,
            
            turn3: `\nTURN 3 - Q3 2026\n${state.turn > 1 ? 'SITUATION EVOLVED.' : ''}\nGDP IS ${state.gdp.toFixed(1)}%\nUNEMPLOYMENT AT ${state.unemployment.toFixed(1)}%\nINFLATION STUCK AT ${state.inflation.toFixed(1)}%\n                \nAVAILABLE ACTIONS:\n1. MORE_SPENDING - DOUBLE DOWN ON INFRASTRUCTURE\n2. TARIFFS - ESCALATE TRADE WAR WITH ALLIES TOO\n3. WAGE_CONTROL - ENFORCE WAGE CAPS BY EXECUTIVE ORDER\n4. FED_INDEPENDENCE - DECLARE INSTITUTIONAL INDEPENDENCE`,
            
            turn4: `\nTURN 4 - Q4 2026\n${state.turn > 1 ? 'ECONOMIC CONDITIONS:' : ''}\nGDP: ${state.gdp.toFixed(1)}% | UNEMPLOYMENT: ${state.unemployment.toFixed(1)}%\nINFLATION: ${state.inflation.toFixed(1)}% | OIL: $${state.oilPrice.toFixed(0)}/bbl\n                \nAVAILABLE ACTIONS:\n1. SUPPRESS_WAGES + TARIFFS - COMBINE BOTH POLICIES\n2. CUT_RATES + SPENDING - STIMULATE AGGRESSIVELY\n3. FED_INDEPENDENCE - RESTORE CREDIBILITY (HARD MOVE)\n4. DO_NOTHING - LET ELECTION RESULT BE WHATEVER IT MAY BE`,
            
            turn5: `\nTURN 5 - Q1 2027 (ELECTION YEAR)\n${state.turn > 1 ? 'THE PRESIDENTIAL ELECTORAL CALENDAR HAS COMMENCED.' : ''}\nAPPROVAL RATING: ${Math.round(state.approval)}%\nFED CREDIBILITY: ${Math.round(state.fedCredibility)}%\n                \nAVAILABLE ACTIONS:\n1. MASSIVE_SPENDING - PRE-ELECTION STIMULUS PACKAGE\n2. SUPPRESS_ALL_PRICES - PRICE CONTROLS ON EVERYTHING\n3. BLAME_FOREIGNERS - DECLARE TRADE WARS WITH MULTIPLE NATIONS\n4. HONESTY_BRIEFING - BE TRANSPARENT ABOUT THE TROUBLES`,
            
            turn6: `\nTURN 6 - Q2 2027 (ELECTION SEASON)\n${state.turn > 1 ? 'APPROVAL TRENDS:' : ''}\nIF INFLATION ABOVE 3% = VOTER PAIN\nIF UNEMPLOYMENT ABOVE 5% = RECESSION FEAR\n                \nAVAILABLE ACTIONS:\n1. CUT_RATES_AGAIN - ANYTHING TO BOOST MARKETS BEFORE ELECTION\n2. WAGE_RESTRAINT + TARIFFS - BLAME FOREIGNERS FOR INFLATION\n3. FED_INTERVENTION - REMOVE FEDEX GOVERNMENT (CRISIS MODE)\n4. TRUST_VOTERS - LET THEM DECIDE THE OUTCOME`,
            
            turn7: `\nTURN 7 - Q3 2027 (PRE-ELECTION FINAL STRETCH)\n${state.turn > 1 ? 'THE ECONOMY HAS REACHED A CRITICAL POINT.' : ''}\n                \nAVAILABLE ACTIONS:\n1. LAST_DITCH_SPENDING - EVERY DOLLAR ON THE TABLE\n2. PRICE_CONTROLS + RATIONING - CONTROL INFLATION DIRECTLY\n3. BLAME_PREDECESSOR - DECLARE ALL PROBLEMS ARE HISTORY'S FAULT\n4. ADMIT_ERRORS + CORRECT - HONESTY WITH CONSEQUENCES`,
            
            turn8: `\nTURN 8 - ELECTION DAY DECISION FINAL\n${state.turn > 1 ? 'FINAL ECONOMIC CONDITIONS:' : ''}\nGDP: ${state.gdp.toFixed(1)}% | UNEMPLOYMENT: ${state.unemployment.toFixed(1)}%\nINFLATION: ${state.inflation.toFixed(1)}% | APPROVAL: ${Math.round(state.approval)}%\n                \nFINAL COMMANDS:\n1. RE_ELECTION_CAMPAIGN - BET EVERYTHING ON MARKETING\n2. POLICY_CORRECTION - FIX WHAT BROKE EVEN IF IT HURTS VOTES NOW\n3. BLAME_FED + OIL + CHINA + EVERYONE ELSE - TOTAL DEFLECTION\n4. RESIGNATE - STEP ASIDE AND LET OTHERS DECIDE OUTCOME`
        };

        async function processCommand(cmd) {
            cmd = cmd.toLowerCase().trim();
            
            const userMsg = document.createElement('div');
            userMsg.className = 'msg president';
            userMsg.textContent = `POTUS@WHITEHOUSE:~$ ${cmdInput.value}`;
            msgArea.insertBefore(userMsg, msgArea.firstChild);
            cmdInput.value = '';
            
            let effect = {};
            let miltonResponse = '';
            
            switch(cmd) {
                case 'cut_rates':
                    state.gdp += 0.35; state.approval += 2; state.inflation += 0.28; effect.msg = 'INTEREST RATES CUT BY 0.25%'; break;
                case 'increase_spending': state.gdp += 0.4; state.unemployment -= 0.12; state.inflation += 0.6; effect.msg = 'GOVERNMENT SPENDING INCREASED'; break;
                case 'more_spending': state.gdp += 0.5; state.unemployment -= 0.15; state.inflation += 0.7; effect.msg = 'MORE INFRASTRUCTURE SPENDING'; break;
                case 'massive_spending': state.gdp += 0.7; state.unemployment -= 0.2; state.inflation += 0.9; effect.msg = 'MASSIVE PRE-ELECTION STIMULUS'; break;
                case 'suppress_wages': state.inflation -= 0.35; state.unemployment += 0.4; state.approval -= (state.turn > 3 ? -2 : -1); effect.msg = 'WAGE GROWTH RESTRAINED'; break;
                case 'wage_control': state.inflation -= 0.4; state.unemployment += 0.5; state.approval -= 3; effect.msg = 'WAGE CAPS ENFORCED BY EXECUTIVE ORDER'; break;
                case 'tariffs': state.inflation += 0.5; state.gdp -= 0.3; state.oilPrice += (state.turn > 4 ? 8 : 4); effect.msg = 'TARIFFS IMPOSED - INFLATION RISES'; break;
                case 'escalate_trade_war': state.inflation += 0.7; state.gdp -= 0.5; state.oilPrice += 12; effect.msg = 'FULL TRADE WAR ESCALATED'; break;
                case 'pressure_fed': state.approval += 3.2; state.fedCredibility -= 9.5; effect.msg = 'FED CREDIBILITY DAMAGED'; break;
                case 'fed_intervention': state.approval += 4; state.fedCredibility -= 15; effect.msg = 'FED INTERVENTION - INSTITUTIONAL INDEPENDENCE ENDANGERED'; break;
                case 'cut_spending': state.inflation -= 0.4; state.gdp -= 0.3; state.approval += (state.turn > 5 ? -1 : 1); effect.msg = 'GOVERNMENT SPENDING REDUCED'; break;
                case 'do_nothing': state.transparency += 3; if (Math.random() > 0.5) { const oilShock = 6 + Math.floor(Math.random() * 8); state.oilPrice += oilShock; state.inflation += (oilShock / 100).toFixed(2); effect.msg = `OIL PRICES JUMPED TO $${state.oilPrice.toFixed(0)}/BBL`; } else { effect.msg = 'ECONOMY STABILIZED WITHOUT INTERVENTION'; } break;
                case 'price_controls': state.inflation -= 0.6; state.gdp -= 0.8; effect.msg = 'PRICE CONTROLS IMPOSED - SHORTAGES INEVITABLE'; break;
                case 'suppress_all_prices': state.inflation -= 0.7; state.gdp -= 1.0; effect.msg = 'COMPREHENSIVE PRICE CONTROLS - MARKET CHAOS'; break;
                case 'blame_foreigners': state.approval += 2.5; effect.msg = 'DEFLECTION NARRATIVE ESTABLISHED'; break;
                case 'blame_predecessor': state.approval += 1.8; effect.msg = 'PREDECESSOR BLAMED FOR ALL PROBLEMS'; break;
                case 're_election_campaign': state.gdp += 0.3; state.inflation += 0.5; effect.msg = 'RE-ELECTION CAMPAIGN SPENDING INCREASED'; break;
                case 'last_ditch_spending': state.gdp += 0.4; state.inflation += 0.6; effect.msg = 'LAST DITCH ECONOMIC STIMULUS'; break;
                case 'policy_correction': state.fedCredibility += 12; state.approval -= (state.turn > 5 ? 8 : 4); effect.msg = 'INSTITUTIONAL CREDIBILITY RESTORED - VOTERS UNHAPPY'; break;
                case 'admit_errors': state.fedCredibility += 10; state.approval -= 6; effect.msg = 'ERRORS ADMITTED - SHORT TERM PAIN FOR LONG TERM GAIN'; break;
                case 'federal_independence': state.fedCredibility += 10; state.approval -= 3; effect.msg = 'FED INDEPENDENCE DECLARED'; break;
                case 'trust_voters': state.transparency += 5; effect.msg = 'VOTERS TRUSTED TO MAKE DECISIONS'; break;
                default: miltonResponse = `COMMAND NOT RECOGNIZED. OPTIONS ARE: ${Object.keys(miltonResponses).filter(k => k !== 'intro').join(', ').toUpperCase()}`;
            }
            
            if (state.inflation > 3.0 && state.turn > 2) { const pain = Math.max(1, (state.inflation - 3.0) * 2); state.approval -= pain; miltonResponse += `\n\n⚠️ INFLATION ABOVE 3% IS CAUSING VOTER PAIN (-${pain.toFixed(1)}%)`; }
            if (state.unemployment > 5.0) { state.approval -= 4; miltonResponse += `\n\n⚠️ UNEMPLOYMENT ABOVE 5% = RECESSION SIGNAL (-4% approval)`; }
            if (state.fedCredibility < 40) { state.gdp -= 0.6; state.inflation += 0.9; miltonResponse += `\n\n❌ FED CREDIBILITY COLLAPSE - POLICY BECOMES ERRATIC`; }
            
            if (effect.msg) await addMessage(effect.msg, 'system');
            state.turn++; document.getElementById('qtr').textContent = Math.ceil(state.turn/2); document.getElementById('turnIndicator').textContent = `TURN: ${state.turn}/${state.maxTurns}`;
            
            if (state.turn > 8) { await endGame(); } else if (miltonResponse) { await miltonSpeak(miltonResponse, 'system'); } else { const nextTurnKey = `turn${Math.min(state.turn, 7)}`; await miltonSpeak(miltonResponses[nextTurnKey], 'system'); }
            updateState();
        }

        function updateState() { buildDashboard(); cmdInput.focus(); }

        async function endGame() {
            let verdict = ''; let type = 'neutral';
            
            if (state.approval >= 55 && state.inflation <= 3.0) { verdict = 'RE-ELECTION WIN - YOU MAINTAINED STABILITY.'; type = 'success'; }
            else if (state.fedCredibility < 40 || state.inflation > 4.5) { verdict = 'STAGFLATION CRISIS - VOTERS REJECTED YOUR TERM.'; type = 'danger'; }
            else if (state.approval >= 45 && state.inflation <= 3.5) { verdict = 'RE-ELECTION BUT WITH COSTS - MIXED LEGACY.'; type = 'warning'; }
            else { verdict = 'DEFEAT OR RECALL - POOR ECONOMIC MANAGEMENT.'; type = 'danger'; }
            
            const finalMsg = `\n=====================================\n${verdict.toUpperCase()}\n=====================================\n\nFINAL ECONOMIC CONDITIONS:\nGDP GROWTH: ${state.gdp.toFixed(1)}%\nUNEMPLOYMENT: ${state.unemployment.toFixed(1)}%\nINFLATION (PCE): ${state.inflation.toFixed(1)}%\nFED CREDIBILITY: ${Math.round(state.fedCredibility)}%\nFINAL APPROVAL: ${Math.round(state.approval)}%\n\n${type === 'success' ? '\n✓ INSTITUTIONS WORKED WHEN TRUSTED.\n✓ TRADE-OFFS WERE ACKNOWLEDGED.' : ''}
            ${type === 'danger' ? `\n❌ INCENTIVES MISALIGNED.
            ❌ SECOND-ORDER EFFECTS IGNORED.
            ❌ ACCOUNTABILITY FAILED.` : ''}\n\nTHANK YOU FOR USING SYSTEM MILTON.\nREMEMBER:\nINSTITUTIONS SHAPE INCENTIVES,\nWHICH SHAPE BEHAVIOR,\nWHICH SHAPES OUTCOMES.\n\nPRESIDENCY TERMINATED - SESSION COMPLETE.`;
            
            await miltonSpeak(finalMsg, type === 'success' ? 'success' : type);
            cmdInput.disabled = true;
        }

        cmdInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') { e.preventDefault(); await processCommand(cmdInput.value); }
        });

        async function initGame() {
            msgArea.innerHTML = '';
            setTimeout(async () => {
                await miltonSpeak(miltonResponses.intro, 'system');
                setTimeout(() => { await miltonSpeak(miltonResponses.turn1, 'system'); buildDashboard(); }, 500);
            }, 1000);
        }

        window.addEventListener('load', initGame);
    </script>
</body>
</html>
